name: Security Checks

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all shell scripts
        run: shellcheck scripts/*.sh

  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: bandit -r app/ -c pyproject.toml --severity-level medium

  pip-audit:
    name: pip-audit (dependency vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate lockfile has hashes
        run: |
          if ! grep -q -- '--hash=' requirements.lock; then
            echo "ERRO: requirements.lock não contém hashes. Regenere com pip-compile --generate-hashes." >&2
            exit 1
          fi

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit against lockfile
        run: pip-audit -r requirements.lock --skip-editable

  osv-scan:
    name: OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install osv-scanner v2.3.8
        run: |
          curl -fsSL -o /usr/local/bin/osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/v2.3.8/osv-scanner_linux_amd64"
          chmod +x /usr/local/bin/osv-scanner

      - name: Run osv-scanner against lockfile
        run: |
          cp requirements.lock /tmp/requirements_scan.txt
          osv-scanner scan source --lockfile /tmp/requirements_scan.txt

  gitleaks:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --exit-code 2

  public-clean:
    name: Public hygiene check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for forbidden terms
        run: bash scripts/check_public_clean.sh
