  <rect x="760" y="95" width="100" height="70" rx="6" class="box-ui" fill="#0A0A1A" stroke="#4488FF" stroke-width="1.5"/>
  <text x="810" y="118" text-anchor="middle" class="label">bitcoin</text>
  <text x="810" y="133" text-anchor="middle" class="label">rain</text>
  <text x="810" y="148" text-anchor="middle" class="sublabel">header animado</text>

