<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <style>
      .bg { fill: #0A0A0A; }
      .title { font-size: 18px; font-weight: bold; fill: #F7931A; }
      .subtitle { font-size: 11px; fill: #666666; }
      .box-core { fill: #0F1A0F; stroke: #F7931A; stroke-width: 1.5; rx: 6; }
      .box-ui { fill: #0A0A1A; stroke: #4488FF; stroke-width: 1.5; }
      .box-ext { fill: #1A0A0A; stroke: #FF4444; stroke-width: 1.5; }
      .box-sec { fill: #1A1A0A; stroke: #FFCC00; stroke-width: 1.5; }
      .box-infra { fill: #0A1A1A; stroke: #00CCAA; stroke-width: 1.5; }
      .label { font-size: 12px; fill: #E0E0E0; font-weight: bold; }
      .sublabel { font-size: 10px; fill: #999999; }
      .arrow { stroke: #444444; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
      .arrow-orange { stroke: #F7931A; stroke-width: 1.5; fill: none; marker-end: url(#arr-o); stroke-dasharray: 4,3; }
      .section-label { font-size: 10px; fill: #555555; font-weight: bold; }
      .layer-bg { fill: #111111; stroke: #222222; stroke-width: 1; rx: 8; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#444444"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F7931A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" class="bg"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" class="title">₿  PhantOS ColdWallet — Arquitetura</text>
  <text x="450" y="54" text-anchor="middle" class="subtitle">v1.0.0  ·  Módulos e fluxo de dados</text>

  <!-- ── Layer: UI ── -->
  <rect x="20" y="70" width="860" height="110" rx="8" class="layer-bg"/>
  <text x="36" y="88" class="section-label">INTERFACE (PySide6)</text>

  <!-- main_window -->
  <rect x="40" y="95" width="160" height="70" rx="6" class="box-ui" fill="#0A0A1A" stroke="#4488FF" stroke-width="1.5"/>
  <text x="120" y="118" text-anchor="middle" class="label">main_window</text>
  <text x="120" y="133" text-anchor="middle" class="sublabel">MainWindow</text>
  <text x="120" y="148" text-anchor="middle" class="sublabel">orquestrador UI</text>

  <!-- bip39_input -->
  <rect x="220" y="95" width="160" height="70" rx="6" class="box-ui" fill="#0A0A1A" stroke="#4488FF" stroke-width="1.5"/>
  <text x="300" y="118" text-anchor="middle" class="label">bip39_input</text>
  <text x="300" y="133" text-anchor="middle" class="sublabel">Bip39SeedWidget</text>
  <text x="300" y="148" text-anchor="middle" class="sublabel">24/12 campos + checksum</text>

  <!-- qr_dialog -->
  <rect x="400" y="95" width="160" height="70" rx="6" class="box-ui" fill="#0A0A1A" stroke="#4488FF" stroke-width="1.5"/>
  <text x="480" y="118" text-anchor="middle" class="label">qr_dialog</text>
  <text x="480" y="133" text-anchor="middle" class="sublabel">QRDisplayDialog</text>
  <text x="480" y="148" text-anchor="middle" class="sublabel">AnimatedQRDialog</text>

  <!-- camera_dialog -->
  <rect x="580" y="95" width="160" height="70" rx="6" class="box-ui" fill="#0A0A1A" stroke="#4488FF" stroke-width="1.5"/>
  <text x="660" y="118" text-anchor="middle" class="label">camera_dialog</text>
  <text x="660" y="133" text-anchor="middle" class="sublabel">CameraDialog</text>
  <text x="660" y="148" text-anchor="middle" class="sublabel">scan QR via webcam</text>

